<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="df-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="50%" stop-color="#161628"/>
      <stop offset="100%" stop-color="#0e0e1c"/>
    </linearGradient>
    <radialGradient id="df-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <filter id="df-neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="df-glow-filter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle hex pattern -->
    <pattern id="df-hex" width="30" height="52" patternUnits="userSpaceOnUse">
      <polygon points="15,0 30,13 30,39 15,52 0,39 0,13" fill="none" stroke="#e94560" stroke-width="0.2" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="32" fill="url(#df-bg)"/>
  <rect width="512" height="512" rx="32" fill="url(#df-glow)"/>
  <rect width="512" height="512" rx="32" fill="url(#df-hex)"/>

  <!-- Avalanche mountain triangles (background motif) -->
  <g fill="none" stroke="#e94560" opacity="0.06">
    <!-- Large background mountains -->
    <polygon points="80,380 180,280 280,380" stroke-width="0.5"/>
    <polygon points="200,380 320,240 440,380" stroke-width="0.5"/>
    <polygon points="140,400 230,320 320,400" stroke-width="0.3"/>
  </g>

  <!-- Central Avalanche triangle (main symbol) -->
  <g transform="translate(256,200)" filter="url(#df-glow-filter)">
    <!-- Outer triangle glow -->
    <polygon points="0,-80 70,40 -70,40" fill="#e94560" opacity="0.04"/>
    <!-- Main triangle -->
    <polygon points="0,-72 62,36 -62,36" fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.5"/>
    <!-- Inner triangle -->
    <polygon points="0,-48 42,24 -42,24" fill="none" stroke="#e94560" stroke-width="1" opacity="0.25"/>
    <!-- Innermost triangle -->
    <polygon points="0,-28 24,14 -24,14" fill="#e94560" opacity="0.1"/>

    <!-- Center "A" letter -->
    <text x="0" y="8" font-family="monospace" font-size="32" fill="#e94560" text-anchor="middle" font-weight="bold" opacity="0.7">A</text>

    <!-- Pulse animation on outer -->
    <polygon points="0,-80 70,40 -70,40" fill="none" stroke="#e94560" stroke-width="1" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="4s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Decorative orbiting dots around triangle -->
  <circle cx="256" cy="200" r="110" fill="none" stroke="#e94560" stroke-width="0.3" opacity="0.08" stroke-dasharray="4,14">
    <animateTransform attributeName="transform" type="rotate" values="0 256 200;360 256 200" dur="60s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="200" r="125" fill="none" stroke="#e94560" stroke-width="0.2" opacity="0.05" stroke-dasharray="2,20">
    <animateTransform attributeName="transform" type="rotate" values="360 256 200;0 256 200" dur="80s" repeatCount="indefinite"/>
  </circle>

  <!-- Node dots on orbit -->
  <g fill="#e94560">
    <circle cx="366" cy="200" r="2.5" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="146" cy="200" r="2.5" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="90" r="2.5" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="310" r="2.5" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Subtle connection lines -->
  <g stroke="#e94560" stroke-width="0.3" opacity="0.06" stroke-dasharray="4,8">
    <line x1="366" y1="200" x2="256" y2="200"/>
    <line x1="146" y1="200" x2="256" y2="200"/>
    <line x1="256" y1="90" x2="256" y2="200"/>
    <line x1="256" y1="310" x2="256" y2="200"/>
  </g>

  <!-- Archetype label -->
  <text x="256" y="360" font-family="monospace" font-size="30" fill="#e94560" text-anchor="middle" font-weight="bold" filter="url(#df-neon)" letter-spacing="3">
    AGENT ARENA
  </text>

  <!-- Subtitle -->
  <text x="256" y="390" font-family="monospace" font-size="14" fill="#b83050" text-anchor="middle" letter-spacing="4">
    WORKSHOP NFT
  </text>

  <!-- Separator -->
  <line x1="156" y1="410" x2="356" y2="410" stroke="#e94560" stroke-width="1" opacity="0.2"/>
  <circle cx="256" cy="410" r="2" fill="#e94560" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom avalanche text -->
  <text x="256" y="442" font-family="monospace" font-size="9" fill="#e94560" text-anchor="middle" opacity="0.15" letter-spacing="2">
    AVALANCHE FUJI TESTNET
  </text>

  <!-- Chain ID badge -->
  <g transform="translate(256,468)">
    <rect x="-30" y="-10" width="60" height="16" rx="8" fill="#e94560" opacity="0.08" stroke="#e94560" stroke-width="0.5" opacity="0.15"/>
    <text x="0" y="2" font-family="monospace" font-size="8" fill="#e94560" text-anchor="middle" opacity="0.3">43113</text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#e94560" stroke-width="1.2" fill="none" opacity="0.15">
    <path d="M18 46 L18 18 L46 18"/>
    <path d="M466 18 L494 18 L494 46"/>
    <path d="M18 466 L18 494 L46 494"/>
    <path d="M466 494 L494 494 L494 466"/>
  </g>

  <!-- Pulsing corner nodes -->
  <circle cx="18" cy="18" r="2" fill="#e94560" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="494" cy="18" r="2" fill="#e94560" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="494" r="2" fill="#e94560" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="494" cy="494" r="2" fill="#e94560" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>