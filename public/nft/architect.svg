<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ar-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0800"/>
      <stop offset="50%" stop-color="#1a0e00"/>
      <stop offset="100%" stop-color="#0f0900"/>
    </linearGradient>
    <radialGradient id="ar-glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
    </radialGradient>
    <filter id="ar-neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ar-soft-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Blueprint grid pattern -->
    <pattern id="ar-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#ff8c00" stroke-width="0.2" opacity="0.06"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#ff8c00" stroke-width="0.2" opacity="0.06"/>
      <line x1="0" y1="20" x2="40" y2="20" stroke="#ff8c00" stroke-width="0.1" opacity="0.03"/>
      <line x1="20" y1="0" x2="20" y2="40" stroke="#ff8c00" stroke-width="0.1" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="32" fill="url(#ar-bg)"/>
  <rect width="512" height="512" rx="32" fill="url(#ar-glow)"/>
  <rect width="512" height="512" rx="32" fill="url(#ar-grid)"/>

  <!-- Blueprint border frame -->
  <rect x="30" y="30" width="452" height="452" rx="8" fill="none" stroke="#ff8c00" stroke-width="0.5" opacity="0.12"/>
  <rect x="40" y="40" width="432" height="432" rx="4" fill="none" stroke="#ff8c00" stroke-width="0.3" opacity="0.08"/>

  <!-- Building structure (center) -->
  <g filter="url(#ar-soft-glow)">
    <!-- Foundation -->
    <rect x="156" y="280" width="200" height="12" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.4"/>
    <line x1="156" y1="292" x2="356" y2="292" stroke="#ff8c00" stroke-width="2" opacity="0.5"/>

    <!-- Pillars -->
    <rect x="170" y="180" width="16" height="100" fill="#ff8c00" opacity="0.08" stroke="#ff8c00" stroke-width="1" opacity="0.35"/>
    <rect x="326" y="180" width="16" height="100" fill="#ff8c00" opacity="0.08" stroke="#ff8c00" stroke-width="1" opacity="0.35"/>
    <rect x="236" y="200" width="40" height="80" fill="#ff8c00" opacity="0.05" stroke="#ff8c00" stroke-width="0.8" opacity="0.25"/>

    <!-- Roof / Triangle -->
    <polygon points="256,120 146,180 366,180" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.45"/>
    <polygon points="256,140 166,180 346,180" fill="#ff8c00" opacity="0.04"/>

    <!-- Keystone -->
    <circle cx="256" cy="155" r="8" fill="#ff8c00" opacity="0.15" stroke="#ff8c00" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="155" r="3" fill="#ffa500" opacity="0.5">
      <animate attributeName="r" values="3;4;3" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Layer labels (blockchain layers) -->
  <g font-family="monospace" font-size="7" fill="#ff8c00" opacity="0.2" text-anchor="end">
    <text x="145" y="290">L0 // CONSENSUS</text>
    <text x="145" y="245">L1 // CRYPTO</text>
    <text x="145" y="200">L2 // PROTOCOL</text>
    <text x="145" y="160">L3 // APPLICATION</text>
  </g>

  <!-- Dimension lines -->
  <g stroke="#ff8c00" stroke-width="0.3" opacity="0.15">
    <line x1="156" y1="305" x2="356" y2="305"/>
    <line x1="156" y1="302" x2="156" y2="308"/>
    <line x1="356" y1="302" x2="356" y2="308"/>
    <!-- Vertical dimension -->
    <line x1="375" y1="120" x2="375" y2="292"/>
    <line x1="372" y1="120" x2="378" y2="120"/>
    <line x1="372" y1="292" x2="378" y2="292"/>
  </g>

  <!-- Floating blueprint nodes -->
  <g fill="none" stroke="#ff8c00" stroke-width="0.5" opacity="0.12">
    <rect x="80" y="100" width="20" height="20" rx="2"/>
    <rect x="412" y="110" width="20" height="20" rx="2"/>
    <rect x="90" y="340" width="15" height="15" rx="1"/>
    <rect x="400" y="330" width="18" height="18" rx="2"/>
  </g>

  <!-- Connection lines from nodes -->
  <g stroke="#ff8c00" stroke-width="0.3" opacity="0.08" stroke-dasharray="3,5">
    <line x1="100" y1="110" x2="170" y2="155"/>
    <line x1="422" y1="120" x2="346" y2="155"/>
    <line x1="97" y1="347" x2="170" y2="280"/>
    <line x1="409" y1="339" x2="340" y2="280"/>
  </g>

  <!-- Rotating compass element -->
  <g transform="translate(256, 220)" opacity="0.1">
    <circle r="50" fill="none" stroke="#ff8c00" stroke-width="0.4" stroke-dasharray="2,6">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="60s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Archetype label -->
  <text x="256" y="380" font-family="monospace" font-size="28" fill="#ff8c00" text-anchor="middle" font-weight="bold" filter="url(#ar-neon)" letter-spacing="3">
    ARCHITECT
  </text>

  <!-- Subtitle -->
  <text x="256" y="408" font-family="monospace" font-size="11" fill="#cc7000" text-anchor="middle" letter-spacing="4">
    AGENT ARENA WORKSHOP
  </text>

  <!-- Separator line -->
  <line x1="176" y1="425" x2="336" y2="425" stroke="#ff8c00" stroke-width="1" opacity="0.2"/>
  <rect x="252" y="422" width="8" height="6" fill="none" stroke="#ff8c00" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom text -->
  <text x="256" y="455" font-family="monospace" font-size="8" fill="#cc7000" text-anchor="middle" opacity="0.2" letter-spacing="2">
    BUILD THE CHAIN, LAYER BY LAYER
  </text>

  <!-- Corner brackets -->
  <g stroke="#ff8c00" stroke-width="1" fill="none" opacity="0.15">
    <path d="M20 44 L20 20 L44 20"/>
    <rect x="18" y="18" width="4" height="4" fill="#ff8c00" opacity="0.2"/>
    <path d="M468 20 L492 20 L492 44"/>
    <rect x="490" y="18" width="4" height="4" fill="#ff8c00" opacity="0.2"/>
    <path d="M20 468 L20 492 L44 492"/>
    <rect x="18" y="490" width="4" height="4" fill="#ff8c00" opacity="0.2"/>
    <path d="M468 492 L492 492 L492 468"/>
    <rect x="490" y="490" width="4" height="4" fill="#ff8c00" opacity="0.2"/>
  </g>
</svg>
